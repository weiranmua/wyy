name: Refresh Cookie

on:
  schedule:
    - cron: '0 14 * * 0'  # UTC14=北京时间22点周日
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pycryptodome PyNaCl -i https://pypi.tuna.tsinghua.edu.cn/simple
        # 先手动git拉源码，再本地安装，避开pip内置git克隆报错
        git clone https://gitee.com/mirrors_pyncm/pyncm.git
        cd pyncm
        pip install . -i https://pypi.tuna.tsinghua.edu.cn/simple
    
    - name: Run refresh script
      env:
        MUSIC_U: ${{ secrets.MUSIC_U }}
        CSRF: ${{ secrets.CSRF }}
        NETEASE_PHONE: ${{ secrets.NETEASE_PHONE }}
        NETEASE_PASSWORD: ${{ secrets.NETEASE_PASSWORD }}
        NETEASE_MD5_PASSWORD: ${{ secrets.NETEASE_MD5_PASSWORD }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
      run: python refresh_cookie.py
