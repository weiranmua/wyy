name: Auto Score

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # 安装依赖 + 强制国内镜像 + 不走git，彻底解决pyncm报错
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pycryptodome PyNaCl -i https://pypi.tuna.tsinghua.edu.cn/simple
        pip install https://github.com/mos9527/pyncm/archive/refs/heads/master.zip --trusted-host github.com
    
    - name: Run script
      env:
        MUSIC_U: ${{ secrets.MUSIC_U }}
        CSRF: ${{ secrets.CSRF }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
        WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
        SCORE: ${{ secrets.SCORE }}
        FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
      run: python main.py
