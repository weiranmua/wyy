name: Auto Score

on:
  schedule:
    - cron: '0 17 * * *'  # UTC 17:00 (北京时间1:00)
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    
    - name: Set up Git credentials
  run: |
    git config --global url."https://github.com/".insteadOf "https://github.com/"
    git config --global http.sslVerify false # 解决SSL/网络异常
- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    
    - name: Run script
      env:
        MUSIC_U: ${{ secrets.MUSIC_U }}
        CSRF: ${{ secrets.CSRF }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
        WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
        SCORE: ${{ secrets.SCORE }}
        FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
      run: python main.py 
